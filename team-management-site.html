<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦁チーム運営管理サイト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg: #f6f3ee;
    --card: #ffffff;
    --ink: #292522;
    --ink-soft: #6f6a63;
    --line: #e7e2da;
    --accent: #2f6b63;
    --accent-soft: #e4efec;
    --gold: #b98a3d;
    --danger: #c1552e;
    --radius: 14px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.7;
  }
  header{
    text-align:center;
    padding:44px 20px 30px;
  }
  header h1{
    font-family:'Shippori Mincho', serif;
    font-size:1.7rem;
    font-weight:700;
    letter-spacing:.06em;
  }
  header p{
    color:var(--ink-soft);
    font-size:.85rem;
    margin-top:6px;
    letter-spacing:.04em;
  }
  main{
    max-width:680px;
    margin:0 auto;
    padding:0 16px 80px;
  }

  /* ── サイト上部のタブ切り替え(予定管理 / 視聴会・トレーニング) ── */
  .tab-switch{
    display:flex;
    gap:6px;
    margin-bottom:20px;
  }
  .tab-switch button{
    flex:1;
    padding:11px 10px;
    border-radius:10px;
    border:1.5px solid var(--line);
    background:#fff;
    color:var(--ink-soft);
    font-size:.833rem;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }
  .tab-switch button.active{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }

  .toolbar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:28px;
  }
  .toolbar input{
    flex:1;
    padding:11px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:.9rem;
    font-family:inherit;
    background:#fff;
  }
  .toolbar input:focus{ outline:none; border-color:var(--accent); }
  select{
    padding:10px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:.85rem;
    font-family:inherit;
    background:#fff;
    color:var(--ink);
  }
  select:focus{ outline:none; border-color:var(--accent); }
  .status{ font-size:.78rem; color:var(--ink-soft); }

  /* ── カテゴリーフィルター(視聴会・トレーニングタブ用) ── */
  .category-filter{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:20px;
  }
  .category-chip{
    padding:7px 15px;
    border-radius:20px;
    border:1.5px solid var(--line);
    background:#fff;
    color:var(--ink-soft);
    font-size:.78rem;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
    white-space:nowrap;
  }
  .category-chip.active{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }

  .block{ margin-bottom:34px; }
  .block-title{
    font-family:'Shippori Mincho', serif;
    font-size:1.1rem;
    font-weight:700;
    text-align:center;
    margin-bottom:16px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .section-title{
    display:inline-block;
    font-size:.78rem;
    font-weight:700;
    color:var(--accent);
    background:var(--accent-soft);
    padding:4px 14px;
    border-radius:20px;
    margin:18px 0 10px;
  }
  .section-title:first-of-type{ margin-top:0; }

  .row-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:10px;
  }
  .row-top{
    display:flex; align-items:baseline; justify-content:space-between;
    gap:8px; flex-wrap:wrap;
  }
  .datetime{ font-size:.92rem; font-weight:700; color:var(--gold); }
  .fields{
    display:flex; flex-wrap:wrap; gap:4px 16px; margin-top:6px;
  }
  .field{ font-size:.78rem; color:var(--ink-soft); }
  .field b{ color:var(--ink); font-weight:700; }

  .register{ display:flex; gap:8px; margin-top:12px; }
  .register input{
    flex:1; padding:9px 12px; border-radius:10px;
    border:1.5px solid var(--line); font-size:.85rem; font-family:inherit;
  }
  .register input:focus{ outline:none; border-color:var(--accent); }
  .register button{
    padding:0 16px; border-radius:20px; border:none;
    background:var(--gold); color:#fff; font-size:.78rem; font-weight:700;
    font-family:inherit; cursor:pointer;
  }
  .register button:hover{ background:#9c7530; }
  .register button:active{ transform:scale(0.98); }
  .register button:disabled{ opacity:.5; cursor:default; }

  .empty-note{
    display:inline-block; margin-top:8px; font-size:.72rem; font-weight:700;
    color:var(--accent); background:var(--accent-soft);
    padding:3px 10px; border-radius:20px;
  }
  .msg{ font-size:.74rem; margin-top:6px; }
  .msg.ok{ color:var(--accent); }
  .msg.err{ color:var(--danger); }

  .loading, .empty-state, .list-empty{
    text-align:center; color:#b3aca2; font-size:.88rem; padding:60px 0;
  }

  /* ── 視聴会・トレーニングのイベントカード(スケジュールサイトから移植) ── */
  .event-card{
    background:var(--card);
    border-radius:var(--radius);
    border:1px solid var(--line);
    margin-bottom:16px;
    overflow:hidden;
  }
  .event-card.past{
    opacity:.55;
    filter:grayscale(.6);
  }
  .past-badge{
    display:inline-flex;
    align-items:center;
    height:22px;
    padding:0 10px;
    border-radius:20px;
    font-size:.68rem;
    font-weight:700;
    background:#e3e0d9;
    color:#6f6a63;
    margin-left:6px;
    vertical-align:middle;
  }
  .event-main{
    display:flex;
    gap:16px;
    padding:18px;
  }
  .event-thumb{
    width:92px;
    height:92px;
    border-radius:10px;
    object-fit:cover;
    flex-shrink:0;
    background:var(--accent-soft);
  }
  .event-info{ flex:1; min-width:0; }
  .event-date{
    font-size:.82rem;
    color:var(--gold);
    font-weight:700;
    letter-spacing:.02em;
    margin-bottom:4px;
  }
  .event-title{
    font-size:1.02rem;
    font-weight:700;
    line-height:1.45;
  }
  .event-place{
    font-size:.78rem;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .event-tags{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    margin-top:6px;
  }
  .event-tag{
    font-size:.7rem;
    font-weight:700;
    padding:2px 10px;
    border-radius:20px;
    background:var(--accent-soft);
    color:var(--accent);
  }
  .event-actions{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    gap:5px;
    height:34px;
    padding:0 15px;
    border-radius:20px;
    font-size:.78rem;
    font-weight:700;
    font-family:inherit;
    text-decoration:none;
    border:none;
    cursor:pointer;
    white-space:nowrap;
  }
  .btn-toggle{ background:#f1efe9; color:var(--ink); }
  .btn-toggle:hover{ background:#e8e4db; }
  .btn-gcal{ background:var(--accent); color:#fff !important; }
  .btn-gcal:hover{ background:#255650; }
  .btn-sheet{ background:var(--ink); color:#fff !important; }
  .btn-sheet:hover{ background:#000; }
  .btn-join{ background:var(--gold); color:#fff; }
  .btn-join:hover{ background:#9c7530; }
  .btn-cancel{ background:#fff; color:var(--danger); border:1.5px solid var(--danger); }
  .btn-cancel:hover{ background:#fbeee8; }

  .join-row{ margin-top:10px; }
  .join-status{
    display:inline-flex;
    align-items:center;
    gap:5px;
    height:34px;
    padding:0 15px;
    border-radius:20px;
    font-size:.78rem;
    font-weight:700;
    background:var(--accent-soft);
    color:var(--accent);
    margin-right:8px;
  }
  .join-form{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .join-form input{
    flex:1;
    min-width:0;
    padding:9px 12px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:.85rem;
    font-family:inherit;
  }
  .join-form input:focus{ outline:none; border-color:var(--accent); }
  .join-msg{
    font-size:.76rem;
    color:var(--danger);
    margin-top:6px;
  }
  .join-msg.ok{ color:var(--accent); }

  .arrow{ display:inline-block; transition:transform .2s; }
  .arrow.open{ transform:rotate(180deg); }

  .event-detail{
    display:none;
    padding:0 18px 20px;
    border-top:1px solid var(--line);
  }
  .event-detail.open{ display:block; }
  .event-detail-inner{
    font-size:.88rem;
    color:#454138;
    white-space:pre-wrap;
    padding-top:14px;
  }
  .event-detail-inner a{
    color:var(--accent);
    word-break:break-all;
    text-decoration:underline;
  }

  footer{
    text-align:center; padding:24px; color:#c3bcb0; font-size:.75rem;
  }
</style>
</head>
<body>

<header>
  <h1>🦁チーム運営管理サイト</h1>
</header>

<main>
  <div class="tab-switch" id="tabSwitch"></div>

  <!-- 予定管理タブ(初回フォロー/グループコンサル/ユーザーサポート会) -->
  <div id="scheduleView">
    <div class="toolbar">
      <select id="monthSelect"></select>
      <span class="status" id="statusText"></span>
    </div>
    <div id="content">
      <div class="loading">読み込み中…</div>
    </div>
  </div>

  <!-- 視聴会・トレーニングタブ(スケジュールサイトから移植) -->
  <div id="trainingView" style="display:none;">
    <div class="toolbar">
      <input type="text" id="trainingSearch" placeholder="タイトルで検索">
    </div>
    <div class="category-filter" id="trainingCategoryFilter"></div>
    <div id="trainingStatusMsg" class="list-empty" style="display:none;"></div>
    <div id="trainingEventList"></div>
  </div>
</main>

<footer>© LunaRa Lab</footer>

<script>
/* ================= 設定 ================= */
const CONFIG = {
  // 参加者データの書き込み先(GASが直接書き込む場所)。月をまたぐ単一タブ。
  PARTICIPANTS_SOURCE: {
    SPREADSHEET_ID: '1rmy1VNkjKLO9SiwgxJOSXjGp06Vag-R1G8l-SRIvSSs',
    SCHEDULE_TAB: 'グルコン/ユーサポ', // 列: 大区分,担当者・講師,日程,参加者,グルコンリーダー,紹介者,入力チェック,備考,元シート行番号（書き込み用）
    SCHEDULE_TAB_GID: '1011201121',
    FIRST_FOLLOW_TAB: '初回フォロー', // 列: 日程,担当者,参加者,zoom,入力チェック
    FIRST_FOLLOW_TAB_GID: '1676811778'
  },

  // GAS(参加登録用)のウェブアプリURL。register/update/join/cancelの全アクションで共通。
  GAS_URL: 'https://script.google.com/macros/s/AKfycbzf6htFAvB_nsBlH3dvsLuT6Gum2IjLmMurIgpkt-WNzLReJdW2Oxc4nJp5VnvJA_kW/exec',

  // 表示する月(日程文字列 "7/3(月)..." の先頭月数字で絞り込む)
  MONTHS: [
    { label: '2026年7月', month: 7, year: 2026 }
    // { label: '2026年8月', month: 8, year: 2026 },
  ],

  // 視聴会・トレーニングのデータ元(別のスプレッドシート。参加登録あり)
  TRAINING_SOURCE: {
    SPREADSHEET_ID: '1qzOUSIEb-yfikltC9dLhSqKQPRBImZABpw4OFRbxXko',
    SHEET_NAME: '視聴会・トレーニング'
  },

  // 視聴会・トレーニングの参加者一覧(申込ログ)の読み込み元
  JOIN_LOG_SOURCE: {
    SPREADSHEET_ID: '1rmy1VNkjKLO9SiwgxJOSXjGp06Vag-R1G8l-SRIvSSs',
    SHEET_NAME: '【見る専】管理ログ'
  },

  // グループコンサル/ユーザーサポート会の「日程・担当者・グルコンリーダー・zoomURL」の入力元
  SCHEDULE_SOURCE: {
    SPREADSHEET_ID: '1qzOUSIEb-yfikltC9dLhSqKQPRBImZABpw4OFRbxXko',
    SHEET_NAME: 'グルコン・ユーザーサポート会' // 実際のタブ名に合わせて調整してください
  }
};
/* ========================================= */

// 参加者データの該当行を直接開くURL(行番号が分かる場合はその行、無ければタブ全体を開く)
function buildSheetRowUrl(gid, row) {
  const base = `https://docs.google.com/spreadsheets/d/${CONFIG.PARTICIPANTS_SOURCE.SPREADSHEET_ID}/edit#gid=${gid}`;
  return row ? `${base}&range=A${row}` : base;
}

function stripInvisible(str) {
  return (str || '').replace(/[\u200B-\u200D\uFEFF]/g, '').trim();
}

function monthFromJpDatetime(str) {
  const m = (str || '').match(/^(\d{1,2})\//);
  return m ? parseInt(m[1], 10) : null;
}

// "7/3(月)12:30-14:30" のような日程文字列から、終了時刻(無ければ最後に出てくる時刻、
// それも無ければその日の終わり 23:59)を割り出してDateを作る
function parseJpScheduleEnd(str, year) {
  const md = (str || '').match(/^(\d{1,2})\/(\d{1,2})/);
  if (!md) return null;
  const month = parseInt(md[1], 10);
  const day = parseInt(md[2], 10);

  const times = [...(str || '').matchAll(/(\d{1,2}):(\d{2})/g)];
  let hour = 23;
  let minute = 59;
  if (times.length > 0) {
    const last = times[times.length - 1];
    hour = parseInt(last[1], 10);
    minute = parseInt(last[2], 10);
  }
  return new Date(year, month - 1, day, hour, minute);
}

// 終了時刻が現在より前(=開催が終わっている)かどうか
function isScheduleRowPast(datetimeStr, year) {
  const end = parseJpScheduleEnd(datetimeStr, year);
  if (!end) return false;
  return end.getTime() < Date.now();
}

// "7/3(月)12:30-14:30" のような日程文字列から開始・終了のDateを両方割り出す
function parseJpScheduleRange(str, year) {
  const md = (str || '').match(/^(\d{1,2})\/(\d{1,2})/);
  if (!md) return null;
  const month = parseInt(md[1], 10);
  const day = parseInt(md[2], 10);

  const times = [...(str || '').matchAll(/(\d{1,2}):(\d{2})/g)];
  if (times.length === 0) return null;

  const startT = times[0];
  const endT = times[times.length - 1];
  const start = new Date(year, month - 1, day, parseInt(startT[1], 10), parseInt(startT[2], 10));
  const end = new Date(year, month - 1, day, parseInt(endT[1], 10), parseInt(endT[2], 10));
  return { start, end };
}

// 予定管理タブ(初回フォロー/グループコンサル/ユーザーサポート会)用のGoogleカレンダー追加リンク
function buildScheduleGcalUrl(r, year) {
  const range = parseJpScheduleRange(r.datetime, year);
  if (!range) return null;
  const pad = n => String(n).padStart(2, '0');
  const stamp = d => `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  const title = [r.category, r.section].filter(Boolean).join(' ');
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: title,
    dates: `${stamp(range.start)}/${stamp(range.end)}`,
    ctz: 'Asia/Tokyo'
  });
  return `https://www.google.com/calendar/render?${params.toString()}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function linkify(escapedText) {
  const urlRegex = /((https?:\/\/|www\.)[^\s<]+)/g;
  return escapedText.replace(urlRegex, (match) => {
    const href = match.startsWith('http') ? match : `https://${match}`;
    return `<a href="${href}" target="_blank" rel="noopener">${match}</a>`;
  });
}

function csvUrl(spreadsheetId, sheetName) {
  return `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

function parseCsv(url, header) {
  return new Promise((resolve, reject) => {
    Papa.parse(url, {
      download: true,
      header: !!header,
      complete: (results) => resolve(results.data),
      error: (err) => reject(err)
    });
  });
}

/* ============================================================
   タブ切り替え(予定管理 / 視聴会・トレーニング)
   ============================================================ */
const VIEW_TABS = [
  { key: 'user_support', label: 'ユーザーサポート会' },
  { key: 'group_consul', label: 'グループコンサル' },
  { key: 'training', label: '視聴会・トレーニング' },
  { key: 'first_follow', label: '初回フォロー' }
];
let currentView = 'user_support';

// タブのkeyと、実際のデータ上の大区分名の対応
const CATEGORY_BY_VIEW = {
  first_follow: '初回フォロー',
  group_consul: 'グループコンサル',
  user_support: 'ユーザーサポート会'
};

function renderTabSwitch() {
  const wrap = document.getElementById('tabSwitch');
  wrap.innerHTML = VIEW_TABS.map(t => `
    <button class="${currentView === t.key ? 'active' : ''}" data-key="${t.key}">${escapeHtml(t.label)}</button>
  `).join('');

  wrap.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.key === currentView) return;
      currentView = btn.dataset.key;
      renderTabSwitch();

      const isTraining = currentView === 'training';
      document.getElementById('scheduleView').style.display = isTraining ? 'none' : '';
      document.getElementById('trainingView').style.display = isTraining ? '' : 'none';

      if (isTraining) {
        if (!trainingLoaded) loadTrainingEvents();
        return;
      }

      // 予定管理系タブ(初回フォロー/グループコンサル/ユーザーサポート会)を切り替えたとき、
      // 既にデータ取得済みなら再取得せず再描画するだけにする
      scheduleSelectedSection = '';
      if (cachedMonth) {
        render(cachedFirstFollowRows, cachedScheduleRows, cachedMonth);
      } else {
        loadData();
      }
    });
  });
}

/* ============================================================
   予定管理タブ(初回フォロー/グループコンサル/ユーザーサポート会)
   ============================================================ */
const monthSelect = document.getElementById('monthSelect');
const contentEl = document.getElementById('content');
const statusEl = document.getElementById('statusText');

function initSchedule() {
  CONFIG.MONTHS.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = m.label;
    monthSelect.appendChild(opt);
  });
  monthSelect.addEventListener('change', loadData);
  loadData();
}

// グループコンサルの担当者・講師フィルター(チップ)の選択状態と、再フィルター時に
// 再取得せず再描画できるようにデータをキャッシュしておく
let scheduleSelectedSection = '';
let cachedFirstFollowRows = [];
let cachedScheduleRows = [];
let cachedMonth = null;

function mapTrainingCategory(catRaw) {
  const c = (catRaw || '').trim();
  if (c.includes('視聴')) return '視聴会';
  return 'トレーニング';
}

function loadData() {
  const month = CONFIG.MONTHS[monthSelect.value];
  scheduleSelectedSection = ''; // 月を切り替えたらフィルターをリセット
  contentEl.innerHTML = '<div class="loading">読み込み中…</div>';
  statusEl.textContent = '';

  const scheduleUrl = csvUrl(CONFIG.SCHEDULE_SOURCE.SPREADSHEET_ID, CONFIG.SCHEDULE_SOURCE.SHEET_NAME);
  const gcUsUrl = csvUrl(CONFIG.PARTICIPANTS_SOURCE.SPREADSHEET_ID, CONFIG.PARTICIPANTS_SOURCE.SCHEDULE_TAB);
  const ffUrl = csvUrl(CONFIG.PARTICIPANTS_SOURCE.SPREADSHEET_ID, CONFIG.PARTICIPANTS_SOURCE.FIRST_FOLLOW_TAB);

  Promise.all([
    parseCsv(scheduleUrl, true),
    parseCsv(gcUsUrl, false),
    parseCsv(ffUrl, false)
  ])
    .then(([scheduleData, gcUsData, ffData]) => {
      const participantMap = {};
      gcUsData.forEach((r, i) => {
        if (i === 0) return;
        const section = (r[1] || '').trim();
        const datetime = (r[2] || '').trim();
        if (!datetime) return;
        participantMap[`${section}|${datetime}`] = {
          participants: (r[3] || '').trim(),
          referrer: (r[5] || '').trim(),
          row: i + 1
        };
      });

      // ユーザーサポート会の講師名。シート側の「大区分」列の入力もれ・ゆれに関わらず、
      // この名前が担当者・講師に入っていれば強制的にユーザーサポート会として扱う
      const USER_SUPPORT_SECTIONS = ['のがみんさん', 'みきさん'];

      const scheduleRows = scheduleData
        .filter(r => (r['日程'] || '').trim() !== '' && monthFromJpDatetime(r['日程']) === month.month)
        .map(r => {
          const section = (r['担当者・講師'] || '').trim();
          let category = (r['大区分'] || '').trim();
          if (USER_SUPPORT_SECTIONS.includes(section)) {
            category = 'ユーザーサポート会';
          }
          const datetime = (r['日程'] || '').trim();
          const leader = stripInvisible(r['グルコンリーダー']);
          const zoomUrl = (r['zoomURL'] || '').trim();
          const applyUrl = (r['申込シート'] || '').trim() || null;
          const matched = participantMap[`${section}|${datetime}`];
          return {
            category,
            section,
            datetime,
            leader,
            zoomUrl,
            applyUrl,
            participants: matched ? matched.participants : '',
            referrer: matched ? matched.referrer : '',
            rawRow: matched ? matched.row : '',
            tabGid: CONFIG.PARTICIPANTS_SOURCE.SCHEDULE_TAB_GID
          };
        })
        .filter(r => !(r.category === 'グループコンサル' && !r.leader))
        .filter(r => !isScheduleRowPast(r.datetime, month.year));

      const firstFollowRows = ffData
        .map((r, i) => ({
          idx: i,
          datetime: (r[0] || '').trim(),
          leader: (r[1] || '').trim(),
          participants: (r[2] || '').trim(),
          zoomUrl: (r[3] || '').trim()
        }))
        .filter(r => r.idx !== 0 && r.datetime !== '' && monthFromJpDatetime(r.datetime) === month.month)
        .filter(r => !isScheduleRowPast(r.datetime, month.year))
        .map(r => ({
          category: '初回フォロー',
          datetime: r.datetime,
          leader: r.leader,
          participants: r.participants,
          zoomUrl: r.zoomUrl,
          rawRow: r.idx + 1,
          tabGid: CONFIG.PARTICIPANTS_SOURCE.FIRST_FOLLOW_TAB_GID
        }));

      cachedFirstFollowRows = firstFollowRows;
      cachedScheduleRows = scheduleRows;
      cachedMonth = month;
      render(firstFollowRows, scheduleRows, month);
    })
    .catch(() => {
      contentEl.innerHTML = '<div class="empty-state">データの取得に失敗しました。シート名やIDを確認してください。</div>';
    });
}

function render(firstFollowRows, scheduleRows, month) {
  contentEl.innerHTML = '';

  const category = CATEGORY_BY_VIEW[currentView];
  if (!category) return;

  const source = (category === '初回フォロー') ? firstFollowRows : scheduleRows;
  const catRows = source.filter(r => r.category === category);

  if (catRows.length === 0) {
    contentEl.innerHTML = '<div class="empty-state">この月のデータがありません。</div>';
    statusEl.textContent = '';
    return;
  }

  const block = document.createElement('div');
  block.className = 'block';

  if (category === '初回フォロー') {
    catRows.forEach(r => block.appendChild(makeRowCard(r, month.year)));
  } else if (category === 'グループコンサル') {
    // 担当者・講師のタグ絞り込みチップ(すべて、を含む)
    const allSections = [];
    catRows.forEach(r => {
      if (!allSections.includes(r.section)) allSections.push(r.section);
    });

    const filterWrap = document.createElement('div');
    filterWrap.className = 'category-filter';
    const chipDefs = ['', ...allSections];
    chipDefs.forEach(sec => {
      const chip = document.createElement('button');
      chip.className = 'category-chip' + (scheduleSelectedSection === sec ? ' active' : '');
      chip.textContent = sec === '' ? 'すべて' : sec;
      chip.addEventListener('click', () => {
        scheduleSelectedSection = sec;
        render(cachedFirstFollowRows, cachedScheduleRows, cachedMonth);
      });
      filterWrap.appendChild(chip);
    });
    block.appendChild(filterWrap);

    const visibleRows = scheduleSelectedSection
      ? catRows.filter(r => r.section === scheduleSelectedSection)
      : catRows;

    const sectionOrder = [];
    const grouped = {};
    visibleRows.forEach(r => {
      if (!grouped[r.section]) {
        grouped[r.section] = [];
        sectionOrder.push(r.section);
      }
      grouped[r.section].push(r);
    });

    sectionOrder.forEach(section => {
      grouped[section].forEach(r => block.appendChild(makeRowCard(r, month.year)));
    });
  } else {
    const sectionOrder = [];
    const grouped = {};
    catRows.forEach(r => {
      if (!grouped[r.section]) {
        grouped[r.section] = [];
        sectionOrder.push(r.section);
      }
      grouped[r.section].push(r);
    });

    const skipSectionTitle = sectionOrder.length === 1 && sectionOrder[0] === category;

    sectionOrder.forEach(section => {
      if (!skipSectionTitle) {
        const sTitle = document.createElement('div');
        sTitle.className = 'section-title';
        sTitle.textContent = section;
        block.appendChild(sTitle);
      }
      grouped[section].forEach(r => block.appendChild(makeRowCard(r, month.year)));
    });
  }

  contentEl.appendChild(block);
  statusEl.textContent = `${catRows.length}件を表示中`;
}

let scheduleCardIdCounter = 0;

function makeRowCard(r, year) {
  const card = document.createElement('div');
  card.className = 'row-card';

  const top = document.createElement('div');
  top.className = 'row-top';
  const dt = document.createElement('div');
  dt.className = 'datetime';
  // グループコンサルは「担当者・講師　日程」を1行にまとめて表示する
  dt.textContent = (r.category === 'グループコンサル' && r.section)
    ? `${r.section}　${r.datetime}`
    : r.datetime;
  top.appendChild(dt);
  card.appendChild(top);

  const fields = document.createElement('div');
  fields.className = 'fields';

  if (r.leader) {
    fields.appendChild(makeField(r.category === '初回フォロー' ? '担当者' : 'リーダー', r.leader));
  }
  if (r.participants) {
    fields.appendChild(makeField('参加者', r.participants));
  }
  if (r.referrer) {
    fields.appendChild(makeField('紹介者', r.referrer));
  }
  card.appendChild(fields);

  const actionsWrap = document.createElement('div');
  actionsWrap.className = 'event-actions';
  actionsWrap.style.marginTop = '8px';

  let zoomId = null;
  if (r.zoomUrl) {
    zoomId = `zoom-${scheduleCardIdCounter++}`;
    const zoomToggle = document.createElement('button');
    zoomToggle.className = 'btn btn-toggle';
    zoomToggle.textContent = 'Zoomはこちら ▼';
    zoomToggle.addEventListener('click', () => {
      const el = document.getElementById(zoomId);
      const isOpen = el.style.display === 'block';
      el.style.display = isOpen ? 'none' : 'block';
      zoomToggle.textContent = isOpen ? 'Zoomはこちら ▼' : 'Zoomはこちら ▲';
    });
    actionsWrap.appendChild(zoomToggle);
  }

  const gcalUrl = buildScheduleGcalUrl(r, year);
  if (gcalUrl) {
    const gcalLink = document.createElement('a');
    gcalLink.className = 'btn btn-gcal';
    gcalLink.href = gcalUrl;
    gcalLink.target = '_blank';
    gcalLink.rel = 'noopener';
    gcalLink.textContent = '📅 Googleカレンダーに追加';
    actionsWrap.appendChild(gcalLink);
  }

  if (r.applyUrl) {
    const applyLink = document.createElement('a');
    applyLink.className = 'btn btn-sheet';
    applyLink.href = r.applyUrl;
    applyLink.target = '_blank';
    applyLink.rel = 'noopener';
    applyLink.textContent = '📝 申込をする';
    actionsWrap.appendChild(applyLink);
  }

  // 参加者の有無に関わらず、常に確認リンクを表示する(一致行があればその行、無ければタブ全体を開く)
  if (r.tabGid) {
    const checkLink = document.createElement('a');
    checkLink.className = 'btn btn-sheet';
    checkLink.href = buildSheetRowUrl(r.tabGid, r.rawRow);
    checkLink.target = '_blank';
    checkLink.rel = 'noopener';
    checkLink.textContent = '🔍 入力確認する';
    actionsWrap.appendChild(checkLink);
  }

  card.appendChild(actionsWrap);

  if (r.zoomUrl) {
    const zoomEl = document.createElement('div');
    zoomEl.id = zoomId;
    zoomEl.className = 'field';
    zoomEl.style.marginTop = '6px';
    zoomEl.style.whiteSpace = 'pre-wrap';
    zoomEl.style.display = 'none';
    zoomEl.innerHTML = linkify(escapeHtml(r.zoomUrl));
    card.appendChild(zoomEl);
  }

  const form = document.createElement('div');
  form.className = 'register';
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = '参加者名を入力';
  const btn = document.createElement('button');
  btn.textContent = '登録';
  form.appendChild(input);
  form.appendChild(btn);
  card.appendChild(form);

  // 紹介者名(任意)。入力すると「参加者名（紹介者名）」の形でまとめて登録される
  const referrerInput = document.createElement('input');
  referrerInput.type = 'text';
  referrerInput.placeholder = '紹介者名(いれば)';
  referrerInput.style.marginTop = '6px';
  referrerInput.style.width = '100%';
  referrerInput.style.padding = '9px 12px';
  referrerInput.style.borderRadius = '10px';
  referrerInput.style.border = '1.5px solid var(--line)';
  referrerInput.style.fontSize = '.85rem';
  referrerInput.style.fontFamily = 'inherit';
  card.appendChild(referrerInput);

  const msg = document.createElement('div');
  msg.className = 'msg';
  card.appendChild(msg);

  btn.addEventListener('click', () => registerParticipant(r, input, referrerInput, btn, msg));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') registerParticipant(r, input, referrerInput, btn, msg);
  });

  // 編集(上書き)機能: 誤入力の訂正用。押すと現在の参加者欄の内容が入った編集フォームが開く
  const editToggle = document.createElement('button');
  editToggle.className = 'btn btn-toggle';
  editToggle.style.marginTop = '8px';
  editToggle.textContent = '✏️ 編集する';
  const editWrap = document.createElement('div');
  editWrap.style.display = 'none';
  editWrap.style.marginTop = '8px';

  const editForm = document.createElement('div');
  editForm.className = 'register';
  const editInput = document.createElement('input');
  editInput.type = 'text';
  editInput.placeholder = '参加者欄の内容(上書きされます)';
  editInput.value = r.participants || '';
  const editBtn = document.createElement('button');
  editBtn.textContent = '更新';
  editForm.appendChild(editInput);
  editForm.appendChild(editBtn);
  editWrap.appendChild(editForm);

  const editMsg = document.createElement('div');
  editMsg.className = 'msg';
  editWrap.appendChild(editMsg);

  editToggle.addEventListener('click', () => {
    const isOpen = editWrap.style.display === 'block';
    editWrap.style.display = isOpen ? 'none' : 'block';
    editToggle.textContent = isOpen ? '✏️ 編集する' : '✏️ 編集を閉じる';
  });
  editBtn.addEventListener('click', () => updateParticipants(r, editInput, editBtn, editMsg));
  editInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') updateParticipants(r, editInput, editBtn, editMsg);
  });

  card.appendChild(editToggle);
  card.appendChild(editWrap);

  return card;
}

function makeField(label, value) {
  const span = document.createElement('span');
  span.className = 'field';
  span.innerHTML = `<b>${label}:</b> ${escapeHtml(value)}`;
  return span;
}

function registerParticipant(r, input, referrerInput, btn, msg) {
  const name = input.value.trim();
  if (!name) return;
  const referrer = referrerInput ? referrerInput.value.trim() : '';
  const combinedName = referrer ? `${name}（${referrer}）` : name;

  btn.disabled = true;
  msg.textContent = '登録中...';
  msg.className = 'msg';

  const params = new URLSearchParams({
    action: 'register',
    category: r.category,
    section: r.section || '',
    datetime: r.datetime,
    name: combinedName,
    leader: r.leader || ''
  });

  fetch(`${CONFIG.GAS_URL}?${params.toString()}`)
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      if (data.success) {
        msg.textContent = '登録しました';
        msg.className = 'msg ok';
        input.value = '';
        if (referrerInput) referrerInput.value = '';
        setTimeout(loadData, 800);
      } else {
        msg.textContent = 'エラー: ' + (data.error || '不明なエラー');
        msg.className = 'msg err';
      }
    })
    .catch(() => {
      btn.disabled = false;
      msg.textContent = '通信エラーが発生しました';
      msg.className = 'msg err';
    });
}

// 参加者欄の内容を丸ごと上書きする(誤入力の訂正用)
function updateParticipants(r, input, btn, msg) {
  const value = input.value.trim();

  btn.disabled = true;
  msg.textContent = '更新中...';
  msg.className = 'msg';

  const params = new URLSearchParams({
    action: 'update',
    category: r.category,
    section: r.section || '',
    datetime: r.datetime,
    name: value
  });

  fetch(`${CONFIG.GAS_URL}?${params.toString()}`)
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      if (data.success) {
        msg.textContent = '更新しました';
        msg.className = 'msg ok';
        setTimeout(loadData, 800);
      } else {
        msg.textContent = 'エラー: ' + (data.error || '不明なエラー');
        msg.className = 'msg err';
      }
    })
    .catch(() => {
      btn.disabled = false;
      msg.textContent = '通信エラーが発生しました';
      msg.className = 'msg err';
    });
}

/* ============================================================
   視聴会・トレーニングタブ(スケジュールサイトの表示・参加登録をそのまま移植)
   ============================================================ */
let TRAINING_EVENTS = [];
let trainingLoaded = false;
let trainingSelectedCategory = '';

function getStoredName() {
  return localStorage.getItem('participantName') || '';
}
function setStoredName(name) {
  localStorage.setItem('participantName', name);
}
function getJoinedMap() {
  try { return JSON.parse(localStorage.getItem('joinedEvents') || '{}'); }
  catch (e) { return {}; }
}
function setJoinedMap(map) {
  localStorage.setItem('joinedEvents', JSON.stringify(map));
}

async function callGas(action, eventTitle, eventDate, name, category) {
  const url = new URL(CONFIG.GAS_URL);
  url.searchParams.set('action', action);
  url.searchParams.set('event', eventTitle);
  url.searchParams.set('date', eventDate);
  url.searchParams.set('name', name);
  url.searchParams.set('category', category || '');
  const res = await fetch(url.toString());
  return res.json();
}

function loadTrainingEvents() {
  const statusEl2 = document.getElementById('trainingStatusMsg');
  statusEl2.style.display = 'block';
  statusEl2.textContent = '読み込み中…';
  document.getElementById('trainingEventList').innerHTML = '';

  const url = csvUrl(CONFIG.TRAINING_SOURCE.SPREADSHEET_ID, CONFIG.TRAINING_SOURCE.SHEET_NAME);
  const logUrl = csvUrl(CONFIG.JOIN_LOG_SOURCE.SPREADSHEET_ID, CONFIG.JOIN_LOG_SOURCE.SHEET_NAME);

  Promise.all([
    parseCsv(url, true),
    parseCsv(logUrl, false)
  ])
    .then(([data, logData]) => {
      const participantsByEvent = buildTrainingParticipantMap(logData);

      const parsed = data
        .filter(row => row.title && row.start)
        .map(row => ({
          image: (row.image || '').trim(),
          title: (row.title || '').trim(),
          place: (row.place || '').trim(),
          start: (row.start || '').trim(),
          end: (row.end || '').trim(),
          detail: row.detail || '',
          sheetUrl: (row.sheetUrl || '').trim() || null,
          categories: (row.category || '')
            .split(',')
            .map(c => c.trim())
            .filter(Boolean),
          participants: (participantsByEvent[(row.title || '').trim()] || []).join('、')
        }));
      parsed.sort((a, b) => new Date(a.start) - new Date(b.start));
      TRAINING_EVENTS = parsed;
      trainingLoaded = true;
      statusEl2.style.display = 'none';
      renderTrainingCategoryFilter();
      renderTraining();
    })
    .catch(() => {
      statusEl2.style.display = 'block';
      statusEl2.textContent = '予定の読み込みに失敗しました。シート名・共有設定をご確認ください。';
    });
}

// 「【見る専】管理ログ」タブ(A:日時 B:イベント名 C:日程 D:名前 E:カテゴリ F:ステータス)から
// イベントごとの参加者一覧を組み立てる。同じ人が複数回登録/キャンセルしている場合は
// 最後のステータスを採用する。
function buildTrainingParticipantMap(logRows) {
  const statusMap = {};
  logRows.forEach(r => {
    const eventTitle = (r[1] || '').trim();
    const name = (r[3] || '').trim();
    const status = (r[5] || '').trim();
    if (!eventTitle || !name) return;
    statusMap[`${eventTitle}\u0001${name}`] = status;
  });

  const participantsByEvent = {};
  Object.keys(statusMap).forEach(key => {
    if (statusMap[key] !== '参加') return;
    const [eventTitle, name] = key.split('\u0001');
    if (!participantsByEvent[eventTitle]) participantsByEvent[eventTitle] = [];
    participantsByEvent[eventTitle].push(name);
  });
  return participantsByEvent;
}

function renderTrainingCategoryFilter() {
  const wrap = document.getElementById('trainingCategoryFilter');
  const allCategories = [...new Set(TRAINING_EVENTS.flatMap(ev => ev.categories))];

  if (allCategories.length === 0) {
    wrap.innerHTML = '';
    return;
  }

  const chips = ['', ...allCategories];
  wrap.innerHTML = chips.map(cat => `
    <button class="category-chip ${trainingSelectedCategory === cat ? 'active' : ''}" data-cat="${escapeHtml(cat)}">
      ${cat === '' ? 'すべて' : escapeHtml(cat)}
    </button>
  `).join('');

  wrap.querySelectorAll('.category-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      trainingSelectedCategory = btn.dataset.cat;
      renderTrainingCategoryFilter();
      renderTraining();
    });
  });
}

function toAbsoluteDate(iso) {
  if (iso.length <= 10) {
    return new Date(`${iso}T00:00:00+09:00`);
  }
  return new Date(`${iso}:00+09:00`);
}

function formatInZone(iso, timeZone) {
  const hasTime = iso.length > 10;
  const date = toAbsoluteDate(iso);
  const parts = new Intl.DateTimeFormat('ja-JP', {
    timeZone,
    year: 'numeric', month: 'numeric', day: 'numeric', weekday: 'short',
    hour: hasTime ? '2-digit' : undefined,
    minute: hasTime ? '2-digit' : undefined,
    hourCycle: 'h23'
  }).formatToParts(date);
  const map = {};
  parts.forEach(p => { map[p.type] = p.value; });
  let base = `${map.year}年${map.month}月${map.day}日（${map.weekday}）`;
  if (hasTime) base += ` ${map.hour}:${map.minute}`;
  return base;
}

function formatDate(iso) {
  return formatInZone(iso, 'Asia/Tokyo');
}

function formatDateRange(start, end) {
  if (!end || end === start) return formatDate(start);
  return `${formatDate(start)} 〜 ${formatDate(end)}`;
}

function getDeviceTimeZone() {
  try {
    return Intl.DateTimeFormat().resolvedOptions().timeZone || 'Asia/Tokyo';
  } catch (e) {
    return 'Asia/Tokyo';
  }
}

function formatDateRangeInDeviceZone(start, end) {
  const tz = getDeviceTimeZone();
  if (!end || end === start) return formatInZone(start, tz);
  return `${formatInZone(start, tz)} 〜 ${formatInZone(end, tz)}`;
}

function isPastEvent(ev) {
  const refIso = ev.end || ev.start;
  let refDate = toAbsoluteDate(refIso);
  if (refIso.length <= 10) {
    refDate = new Date(refDate.getTime() + (24 * 60 * 60 * 1000 - 1));
  }
  return refDate.getTime() < Date.now();
}

function buildGcalUrl(ev) {
  const toGcalStamp = (iso, isEnd) => {
    const allDay = iso.length <= 10;
    let d = new Date(iso);
    if (allDay && isEnd) {
      d = new Date(d.getTime() + 24 * 60 * 60 * 1000);
    }
    const pad = n => String(n).padStart(2, '0');
    if (allDay) {
      return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}`;
    }
    return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  };
  const start = toGcalStamp(ev.start, false);
  const end = toGcalStamp(ev.end || ev.start, true);
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: ev.title,
    dates: `${start}/${end}`,
    details: ev.detail,
    ctz: 'Asia/Tokyo'
  });
  if (ev.place) params.set('location', ev.place);
  return `https://www.google.com/calendar/render?${params.toString()}`;
}

function renderTraining() {
  const list = document.getElementById('trainingEventList');
  const q = document.getElementById('trainingSearch').value.trim().toLowerCase();
  const filtered = TRAINING_EVENTS
    .map((ev, i) => ({ ev, i }))
    .filter(({ ev }) => !q || ev.title.toLowerCase().includes(q))
    .filter(({ ev }) => !trainingSelectedCategory || ev.categories.includes(trainingSelectedCategory));

  if (filtered.length === 0) {
    list.innerHTML = `<div class="list-empty">該当する予定がありません</div>`;
    return;
  }

  list.innerHTML = filtered.map(({ ev, i }) => `
    <div class="event-card ${isPastEvent(ev) ? 'past' : ''}">
      <div class="event-main">
        ${ev.image
          ? `<img class="event-thumb" src="${ev.image}" alt="">`
          : `<div class="event-thumb"></div>`
        }
        <div class="event-info">
          <div class="event-date">${formatDateRange(ev.start, ev.end)}${isPastEvent(ev) ? '<span class="past-badge">終了しました</span>' : ''}</div>
          ${getDeviceTimeZone() !== 'Asia/Tokyo' ? `<div class="field">（${formatDateRangeInDeviceZone(ev.start, ev.end)}）</div>` : ''}
          <div class="event-title">${escapeHtml(ev.title)}</div>
          ${ev.place ? `<div class="event-place">${escapeHtml(ev.place)}</div>` : ''}
          ${ev.categories.length ? `
          <div class="event-tags">
            ${ev.categories.map(c => `<span class="event-tag">${escapeHtml(c)}</span>`).join('')}
          </div>` : ''}
          ${ev.participants ? `<div class="field" style="margin-top:6px;"><b>参加者:</b> ${escapeHtml(ev.participants)}</div>` : ''}
          <div class="event-actions">
            <button class="btn btn-toggle" onclick="toggleTrainingDetail(${i})">
              詳細を見る <span class="arrow" id="t-arrow-${i}">▼</span>
            </button>
            ${!isPastEvent(ev) ? `
            <a class="btn btn-gcal" href="${buildGcalUrl(ev)}" target="_blank" rel="noopener">
              📅 Googleカレンダーに追加
            </a>` : ''}
            ${!isPastEvent(ev) && ev.applyUrl ? `
            <a class="btn btn-sheet" href="${ev.applyUrl}" target="_blank" rel="noopener">
              📝 申込をする
            </a>` : ''}
            ${!isPastEvent(ev) && ev.sheetUrl ? `
            <a class="btn btn-sheet" href="${ev.sheetUrl}" target="_blank" rel="noopener">
              🔍 入力確認する
            </a>` : ''}
          </div>
          <div class="join-row" id="t-join-${i}"></div>
        </div>
      </div>
      <div class="event-detail" id="t-detail-${i}">
        <div class="event-detail-inner">${linkify(escapeHtml(ev.detail))}</div>
      </div>
    </div>
  `).join('');

  filtered.forEach(({ ev, i }) => renderTrainingJoinRow(ev, i));
}

function toggleTrainingDetail(i) {
  const detail = document.getElementById(`t-detail-${i}`);
  const arrow = document.getElementById(`t-arrow-${i}`);
  const isOpen = detail.classList.contains('open');
  detail.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

// フォームが一度開かれたイベントは、送信後も引き続き入力欄を表示する(代理入力対応)
const trainingFormOpen = {};

function renderTrainingJoinRow(ev, i) {
  const row = document.getElementById(`t-join-${i}`);
  if (!row) return;

  if (isPastEvent(ev)) {
    row.innerHTML = '';
    return;
  }

  const joined = getJoinedMap()[ev.title];
  let html = '';

  if (joined) {
    html += `
      <span class="join-status">✓送信済み</span>
      <button class="btn btn-cancel" onclick="handleTrainingCancel(${i})">キャンセル申請したらタップ</button>
    `;
  }

  if (joined || trainingFormOpen[i]) {
    html += `
      <div class="join-form">
        <input type="text" id="t-joinName-${i}" placeholder="お名前・ニックネーム">
        <button class="btn btn-join" onclick="handleTrainingJoinSubmit(${i})">送信</button>
      </div>
      <div class="join-msg" id="t-joinMsg-${i}"></div>
    `;
  } else {
    html += `<button class="btn btn-join" onclick="showTrainingJoinForm(${i})">✅申込シート入力後タップ</button>`;
  }

  row.innerHTML = html;
}

function showTrainingJoinForm(i) {
  trainingFormOpen[i] = true;
  renderTrainingJoinRow(TRAINING_EVENTS[i], i);
}

async function handleTrainingJoinSubmit(i) {
  const ev = TRAINING_EVENTS[i];
  const input = document.getElementById(`t-joinName-${i}`);
  const msgEl = document.getElementById(`t-joinMsg-${i}`);
  const name = input.value.trim();

  if (!name) {
    msgEl.textContent = 'お名前を入力してください';
    msgEl.classList.remove('ok');
    return;
  }

  msgEl.textContent = '送信中…';
  msgEl.classList.remove('ok');

  try {
    const result = await callGas('join', ev.title, formatDateRange(ev.start, ev.end), name, ev.categories.join(','));

    if (result.result === 'ok' || result.result === 'duplicate') {
      setStoredName(name);
      const map = getJoinedMap();
      map[ev.title] = true;
      setJoinedMap(map);
      trainingFormOpen[i] = true;
      renderTrainingJoinRow(ev, i);
      // 送信後は入力欄をクリアして表示したままにし、続けて別の人の代理入力ができるようにする
      const newInput = document.getElementById(`t-joinName-${i}`);
      if (newInput) newInput.value = '';
      // 参加者一覧に反映するため再取得する
      setTimeout(loadTrainingEvents, 800);
    } else {
      msgEl.textContent = '登録に失敗しました。もう一度お試しください';
    }
  } catch (err) {
    msgEl.textContent = '通信エラーが発生しました。時間をおいて再度お試しください';
  }
}

async function handleTrainingCancel(i) {
  const ev = TRAINING_EVENTS[i];
  const name = getStoredName();

  if (!name) {
    alert('登録時のお名前が確認できませんでした。お手数ですが管理者へご連絡ください。');
    return;
  }

  try {
    const result = await callGas('cancel', ev.title, formatDateRange(ev.start, ev.end), name);

    if (result.result === 'ok' || result.result === 'not_found') {
      const map = getJoinedMap();
      delete map[ev.title]; // キャンセル→削除済み
      setJoinedMap(map);
      renderTrainingJoinRow(ev, i);
      // 参加者一覧に反映するため再取得する
      setTimeout(loadTrainingEvents, 800);
    } else {
      alert('キャンセル処理に失敗しました。時間をおいて再度お試しください。');
    }
  } catch (err) {
    alert('通信エラーが発生しました。時間をおいて再度お試しください。');
  }
}

document.getElementById('trainingSearch').addEventListener('input', renderTraining);

/* ================= 初期化 ================= */
renderTabSwitch();
initSchedule();
</script>
