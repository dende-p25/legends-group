<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦁チーム運営管理サイト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg: #f6f3ee;
    --card: #ffffff;
    --ink: #292522;
    --ink-soft: #6f6a63;
    --line: #e7e2da;
    --accent: #2f6b63;
    --accent-soft: #e4efec;
    --gold: #b98a3d;
    --danger: #c1552e;
    --radius: 14px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.7;
  }
  header{
    text-align:center;
    padding:44px 20px 30px;
  }
  header h1{
    font-family:'Shippori Mincho', serif;
    font-size:1.7rem;
    font-weight:700;
    letter-spacing:.06em;
  }
  header p{
    color:var(--ink-soft);
    font-size:.85rem;
    margin-top:6px;
    letter-spacing:.04em;
  }
  main{
    max-width:680px;
    margin:0 auto;
    padding:0 16px 80px;
  }

  .toolbar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:28px;
  }
  select{
    padding:10px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:.85rem;
    font-family:inherit;
    background:#fff;
    color:var(--ink);
  }
  select:focus{ outline:none; border-color:var(--accent); }
  .status{ font-size:.78rem; color:var(--ink-soft); }

  .block{ margin-bottom:34px; }
  .block-title{
    font-family:'Shippori Mincho', serif;
    font-size:1.1rem;
    font-weight:700;
    text-align:center;
    margin-bottom:16px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .section-title{
    display:inline-block;
    font-size:.78rem;
    font-weight:700;
    color:var(--accent);
    background:var(--accent-soft);
    padding:4px 14px;
    border-radius:20px;
    margin:18px 0 10px;
  }
  .section-title:first-of-type{ margin-top:0; }

  .row-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:10px;
  }
  .row-top{
    display:flex; align-items:baseline; justify-content:space-between;
    gap:8px; flex-wrap:wrap;
  }
  .datetime{ font-size:.92rem; font-weight:700; color:var(--gold); }
  .fields{
    display:flex; flex-wrap:wrap; gap:4px 16px; margin-top:6px;
  }
  .field{ font-size:.78rem; color:var(--ink-soft); }
  .field b{ color:var(--ink); font-weight:700; }

  .register{ display:flex; gap:8px; margin-top:12px; }
  .register input{
    flex:1; padding:9px 12px; border-radius:10px;
    border:1.5px solid var(--line); font-size:.85rem; font-family:inherit;
  }
  .register input:focus{ outline:none; border-color:var(--accent); }
  .register button{
    padding:0 16px; border-radius:20px; border:none;
    background:var(--gold); color:#fff; font-size:.78rem; font-weight:700;
    font-family:inherit; cursor:pointer;
  }
  .register button:hover{ background:#9c7530; }
  .register button:active{ transform:scale(0.98); }
  .register button:disabled{ opacity:.5; cursor:default; }

  .empty-note{
    display:inline-block; margin-top:8px; font-size:.72rem; font-weight:700;
    color:var(--accent); background:var(--accent-soft);
    padding:3px 10px; border-radius:20px;
  }
  .msg{ font-size:.74rem; margin-top:6px; }
  .msg.ok{ color:var(--accent); }
  .msg.err{ color:var(--danger); }

  .loading, .empty-state{
    text-align:center; color:#b3aca2; font-size:.88rem; padding:60px 0;
  }

  footer{
    text-align:center; padding:24px; color:#c3bcb0; font-size:.75rem;
  }
</style>
</head>
<body>

<header>
  <h1>🦁チーム運営管理サイト</h1>
  <p>初回フォロー・グループコンサル・ユーザーサポート会の日程一覧</p>
</header>

<main>
  <div class="toolbar">
    <select id="monthSelect"></select>
    <span class="status" id="statusText"></span>
  </div>

  <div id="content">
    <div class="loading">読み込み中…</div>
  </div>
</main>

<footer>© LunaRa Lab</footer>

<script>
/* ================= 設定 ================= */
const CONFIG = {
  // 正規化シートが入っているスプレッドシートのID(初回フォロー/グループコンサル/ユーザーサポート会)
  SPREADSHEET_ID: 'YOUR_SPREADSHEET_ID',

  // GAS(参加登録用)のウェブアプリURL
  GAS_URL: 'YOUR_GAS_WEBAPP_URL',

  // 月ごとの正規化シートタブ名と、書き込み先の元シートタブ名のペア
  // 新しい月が増えたらここに追加していく(yearMonthは視聴会/トレーニングの絞り込みに使用)
  MONTHS: [
    { label: '2026年7月', normalizedSheet: '0_正規化_7月', rawSheet: '7月', yearMonth: '2026-07' }
    // { label: '2026年8月', normalizedSheet: '0_正規化_8月', rawSheet: '8月', yearMonth: '2026-08' },
  ],

  // 視聴会・トレーニングのデータ元(別のスプレッドシート。表示のみ、参加登録なし)
  TRAINING_SOURCE: {
    SPREADSHEET_ID: '1qzOUSIEb-yfikltC9dLhSqKQPRBImZABpw4OFRbxXko',
    SHEET_NAME: 'LDS_Schedule（入力用）' // ← 実際のタブ名に合わせて調整してください
  },

  // グループコンサル/ユーザーサポート会の「日程・担当者・グルコンリーダー・zoomURL」の入力元
  // (フラット形式の新シート。参加者名はここには無く、正規化シート側の参加者データと
  //  「担当者・講師 + 日程」をキーに紐付けて結合する)
  SCHEDULE_SOURCE: {
    SPREADSHEET_ID: '1qzOUSIEb-yfikltC9dLhSqKQPRBImZABpw4OFRbxXko',
    SHEET_NAME: 'グルコン・ユーザーサポート会' // ← 実際のタブ名に合わせて調整してください
  },

  // 表示する大区分の順番
  CATEGORY_ORDER: ['初回フォロー', 'グループコンサル', 'ユーザーサポート会', '視聴会', 'トレーニング']
};
/* ========================================= */

// ゼロ幅スペースなど見た目上「空欄」だが実際には文字が入っているケースを除去
function stripInvisible(str) {
  return (str || '').replace(/[\u200B-\u200D\uFEFF]/g, '').trim();
}

const monthSelect = document.getElementById('monthSelect');
const contentEl = document.getElementById('content');
const statusEl = document.getElementById('statusText');

function init() {
  CONFIG.MONTHS.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = m.label;
    monthSelect.appendChild(opt);
  });
  monthSelect.addEventListener('change', loadData);
  loadData();
}

function csvUrl(spreadsheetId, sheetName) {
  return `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

function parseCsv(url, header) {
  return new Promise((resolve, reject) => {
    Papa.parse(url, {
      download: true,
      header: !!header,
      complete: (results) => resolve(results.data),
      error: (err) => reject(err)
    });
  });
}

// 視聴会/トレーニングのcategory値をこのサイトの2区分にふり分ける判定。
// 実際のcategory列の値(例:「視聴会」「Bトレ」など)に合わせて調整してください。
function mapTrainingCategory(catRaw) {
  const c = (catRaw || '').trim();
  if (c.includes('視聴')) return '視聴会';
  return 'トレーニング';
}

function loadData() {
  const month = CONFIG.MONTHS[monthSelect.value];
  contentEl.innerHTML = '<div class="loading">読み込み中…</div>';
  statusEl.textContent = '';

  const normalizedUrl = csvUrl(CONFIG.SPREADSHEET_ID, month.normalizedSheet);
  const trainingUrl = csvUrl(CONFIG.TRAINING_SOURCE.SPREADSHEET_ID, CONFIG.TRAINING_SOURCE.SHEET_NAME);
  const scheduleUrl = csvUrl(CONFIG.SCHEDULE_SOURCE.SPREADSHEET_ID, CONFIG.SCHEDULE_SOURCE.SHEET_NAME);

  Promise.all([parseCsv(normalizedUrl, false), parseCsv(trainingUrl, true), parseCsv(scheduleUrl, true)])
    .then(([normData, trainingData, scheduleData]) => {
      const normRows = normData
        .filter(r => r.length >= 8 && (r[2] || '').trim() !== '') // C列(日程)が空でない行のみ
        .map(r => ({
          category: (r[0] || '').trim(),
          section: (r[1] || '').trim(),
          datetime: (r[2] || '').trim(),
          participants: (r[3] || '').trim(),
          leader: (r[4] || '').trim(),
          referrer: (r[5] || '').trim(),
          note: (r[6] || '').trim(),
          rawRow: (r[7] || '').trim()
        }));

      // 参加者データを「担当者(セクション)+日程」をキーにルックアップできるようにする
      const participantMap = {};
      normRows.forEach(r => {
        participantMap[`${r.section}|${r.datetime}`] = r;
      });

      // グループコンサル/ユーザーサポート会の日程・リーダー・zoomURLを、フラットシートから取得し
      // 参加者データと結合する
      const scheduleRows = scheduleData
        .filter(r => (r['日程'] || '').trim() !== '')
        .map(r => {
          const category = (r['大区分'] || '').trim();
          const section = (r['担当者・講師'] || '').trim();
          const datetime = (r['日程'] || '').trim();
          const leader = stripInvisible(r['グルコンリーダー']);
          const zoomUrl = (r['zoomURL'] || '').trim();
          const matched = participantMap[`${section}|${datetime}`];
          return {
            category,
            section,
            datetime,
            leader,
            zoomUrl,
            participants: matched ? matched.participants : '',
            referrer: matched ? matched.referrer : '',
            note: matched ? matched.note : '',
            rawRow: matched ? matched.rawRow : ''
          };
        })
        // グループコンサルはグルコンリーダーが不在の枠を非表示にする
        .filter(r => !(r.category === 'グループコンサル' && !r.leader));

      const trainingRows = trainingData
        .filter(r => r.title && r.start && matchesMonth(r.start, month.yearMonth))
        .map(r => ({
          category: mapTrainingCategory(r.category),
          title: (r.title || '').trim(),
          place: (r.place || '').trim(),
          start: (r.start || '').trim(),
          end: (r.end || '').trim(),
          detail: (r.detail || '').trim(),
          sheetUrl: (r.sheetUrl || '').trim()
        }))
        .sort((a, b) => new Date(a.start) - new Date(b.start));

      render(normRows, scheduleRows, trainingRows, month);
    })
    .catch(() => {
      contentEl.innerHTML = '<div class="empty-state">データの取得に失敗しました。シート名やIDを確認してください。</div>';
    });
}

function matchesMonth(startStr, yearMonth) {
  const d = new Date(startStr.replace(/\//g, '-'));
  if (isNaN(d.getTime())) return false;
  const ym = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  return ym === yearMonth;
}

function formatTrainingDateTime(startStr, endStr) {
  const start = new Date(startStr.replace(/\//g, '-'));
  const end = endStr ? new Date(endStr.replace(/\//g, '-')) : null;
  const week = ['日', '月', '火', '水', '木', '金', '土'];
  const pad = n => String(n).padStart(2, '0');
  const s = `${start.getMonth() + 1}/${start.getDate()}(${week[start.getDay()]}) ${pad(start.getHours())}:${pad(start.getMinutes())}`;
  if (!end || isNaN(end.getTime())) return s;
  return `${s}〜${pad(end.getHours())}:${pad(end.getMinutes())}`;
}

function render(rows, scheduleRows, trainingRows, month) {
  contentEl.innerHTML = '';
  let totalCount = 0;

  CONFIG.CATEGORY_ORDER.forEach(category => {
    if (category === '視聴会' || category === 'トレーニング') {
      const items = trainingRows.filter(r => r.category === category);
      if (items.length === 0) return;
      totalCount += items.length;

      const block = document.createElement('div');
      block.className = 'block';
      const blockTitle = document.createElement('div');
      blockTitle.className = 'block-title';
      blockTitle.textContent = category;
      block.appendChild(blockTitle);

      items.forEach(item => block.appendChild(makeTrainingCard(item)));
      contentEl.appendChild(block);
      return;
    }

    // グループコンサル/ユーザーサポート会は、フラットな日程シート(scheduleRows)から描画。
    // 初回フォローは引き続き正規化シート(rows)から描画。
    const source = (category === '初回フォロー') ? rows : scheduleRows;
    const catRows = source.filter(r => r.category === category);
    if (catRows.length === 0) return;
    totalCount += catRows.length;

    const block = document.createElement('div');
    block.className = 'block';

    const blockTitle = document.createElement('div');
    blockTitle.className = 'block-title';
    blockTitle.textContent = category;
    block.appendChild(blockTitle);

    if (category === '初回フォロー') {
      catRows.forEach(r => block.appendChild(makeRowCard(r, month)));
    } else {
      // セクション(担当者/講師)ごとに、出現順を保ったままグループ化
      const sectionOrder = [];
      const grouped = {};
      catRows.forEach(r => {
        if (!grouped[r.section]) {
          grouped[r.section] = [];
          sectionOrder.push(r.section);
        }
        grouped[r.section].push(r);
      });

      // セクションが1つしかなく、かつ大区分名と同じ場合は見出しの二重表示を避ける
      const skipSectionTitle = sectionOrder.length === 1 && sectionOrder[0] === category;

      sectionOrder.forEach(section => {
        if (!skipSectionTitle) {
          const sTitle = document.createElement('div');
          sTitle.className = 'section-title';
          sTitle.textContent = section;
          block.appendChild(sTitle);
        }
        grouped[section].forEach(r => block.appendChild(makeRowCard(r, month)));
      });
    }

    contentEl.appendChild(block);
  });

  if (totalCount === 0) {
    contentEl.innerHTML = '<div class="empty-state">この月のデータがありません。</div>';
    statusEl.textContent = '';
    return;
  }

  statusEl.textContent = `${totalCount}件を表示中`;
}

// 視聴会・トレーニング用カード(表示のみ、参加登録フォームなし)
function makeTrainingCard(item) {
  const card = document.createElement('div');
  card.className = 'row-card';

  const top = document.createElement('div');
  top.className = 'row-top';
  const dt = document.createElement('div');
  dt.className = 'datetime';
  dt.textContent = formatTrainingDateTime(item.start, item.end);
  top.appendChild(dt);
  card.appendChild(top);

  const titleEl = document.createElement('div');
  titleEl.style.fontWeight = '700';
  titleEl.style.marginTop = '4px';
  titleEl.textContent = item.title;
  card.appendChild(titleEl);

  const fields = document.createElement('div');
  fields.className = 'fields';
  if (item.place) fields.appendChild(makeField('会場', item.place));
  card.appendChild(fields);

  if (item.detail) {
    const detailEl = document.createElement('div');
    detailEl.className = 'field';
    detailEl.style.marginTop = '6px';
    detailEl.style.whiteSpace = 'pre-wrap';
    detailEl.innerHTML = linkify(escapeHtml(item.detail));
    card.appendChild(detailEl);
  }

  if (item.sheetUrl) {
    const linkEl = document.createElement('a');
    linkEl.href = item.sheetUrl;
    linkEl.target = '_blank';
    linkEl.rel = 'noopener';
    linkEl.className = 'field';
    linkEl.style.display = 'inline-block';
    linkEl.style.marginTop = '8px';
    linkEl.style.color = 'var(--accent)';
    linkEl.textContent = '管理表を開く →';
    card.appendChild(linkEl);
  }

  return card;
}

// テキスト中のURLを自動的にリンクに変換する
function linkify(escapedText) {
  const urlRegex = /((https?:\/\/|www\.)[^\s<]+)/g;
  return escapedText.replace(urlRegex, (match) => {
    const href = match.startsWith('http') ? match : `https://${match}`;
    return `<a href="${href}" target="_blank" rel="noopener">${match}</a>`;
  });
}

function makeRowCard(r, month) {
  const card = document.createElement('div');
  card.className = 'row-card';

  const top = document.createElement('div');
  top.className = 'row-top';
  const dt = document.createElement('div');
  dt.className = 'datetime';
  dt.textContent = r.datetime;
  top.appendChild(dt);
  card.appendChild(top);

  const fields = document.createElement('div');
  fields.className = 'fields';

  if (r.participants) {
    fields.appendChild(makeField('参加者', r.participants));
  }
  if (r.leader) {
    fields.appendChild(makeField(r.category === '初回フォロー' ? '担当者' : 'リーダー', r.leader));
  }
  if (r.referrer) {
    fields.appendChild(makeField('紹介者', r.referrer));
  }
  if (r.note) {
    fields.appendChild(makeField('備考', r.note));
  }
  card.appendChild(fields);

  if (r.zoomUrl) {
    const zoomEl = document.createElement('div');
    zoomEl.className = 'field';
    zoomEl.style.marginTop = '6px';
    zoomEl.innerHTML = linkify(escapeHtml(r.zoomUrl));
    card.appendChild(zoomEl);
  }

  if (!r.participants) {
    const note = document.createElement('span');
    note.className = 'empty-note';
    note.textContent = '空き枠';
    card.appendChild(note);
  }

  // rawRow(参加者シート側の行番号)が無い場合は、まだ参加者データと紐づいていない枠なので
  // 登録フォームは出さず表示のみにする
  if (!r.rawRow) {
    return card;
  }

  // 参加登録フォーム
  const form = document.createElement('div');
  form.className = 'register';
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = '参加者名を入力';
  const btn = document.createElement('button');
  btn.textContent = '登録';
  form.appendChild(input);
  form.appendChild(btn);
  card.appendChild(form);

  const msg = document.createElement('div');
  msg.className = 'msg';
  card.appendChild(msg);

  btn.addEventListener('click', () => register(r, month, input, btn, msg));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') register(r, month, input, btn, msg);
  });

  return card;
}

function makeField(label, value) {
  const span = document.createElement('span');
  span.className = 'field';
  span.innerHTML = `<b>${label}:</b> ${escapeHtml(value)}`;
  return span;
}

function register(r, month, input, btn, msg) {
  const name = input.value.trim();
  if (!name) return;

  btn.disabled = true;
  msg.textContent = '登録中...';
  msg.className = 'msg';

  const params = new URLSearchParams({
    action: 'register',
    sheetName: month.rawSheet,
    row: r.rawRow,
    category: r.category,
    name: name
  });

  fetch(`${CONFIG.GAS_URL}?${params.toString()}`)
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      if (data.success) {
        msg.textContent = '登録しました';
        msg.className = 'msg ok';
        input.value = ''; // 送信後は入力欄をクリア(代理入力しやすくする)
        setTimeout(loadData, 800); // 最新状態を再取得
      } else {
        msg.textContent = 'エラー: ' + (data.error || '不明なエラー');
        msg.className = 'msg err';
      }
    })
    .catch(() => {
      btn.disabled = false;
      msg.textContent = '通信エラーが発生しました';
      msg.className = 'msg err';
    });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

init();
</script>
</body>
</html>
